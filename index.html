<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>Username Generator</title>
    <meta
      name="description"
      content="A small, open-source username generator. Clean presets, full control, light/dark theme."
    />
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="js/app.js" defer></script>
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="site-header">
      <h1 class="site-title">Username Generator</h1>
      <nav class="header-actions" aria-label="Site actions">
        <a
          class="icon-btn"
          href="https://github.com/joetul/username-generator"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="View source on GitHub"
        >
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M12 .5C5.65.5.5 5.65.5 12c0 5.08 3.29 9.39 7.86 10.91.58.11.79-.25.79-.56 0-.28-.01-1.02-.02-2-3.2.69-3.88-1.54-3.88-1.54-.52-1.33-1.28-1.68-1.28-1.68-1.05-.72.08-.7.08-.7 1.16.08 1.77 1.19 1.77 1.19 1.03 1.77 2.7 1.26 3.36.96.1-.75.4-1.26.73-1.55-2.55-.29-5.24-1.28-5.24-5.69 0-1.26.45-2.29 1.19-3.09-.12-.29-.52-1.47.11-3.06 0 0 .97-.31 3.18 1.18a11.04 11.04 0 0 1 5.79 0c2.21-1.49 3.18-1.18 3.18-1.18.63 1.59.23 2.77.11 3.06.74.8 1.19 1.83 1.19 3.09 0 4.42-2.7 5.39-5.26 5.68.41.35.77 1.05.77 2.11 0 1.52-.01 2.75-.01 3.12 0 .31.21.68.8.56C20.22 21.38 23.5 17.08 23.5 12 23.5 5.65 18.35.5 12 .5z"
              fill="currentColor"
              stroke="none"
            />
          </svg>
        </a>
        <button
          id="theme-toggle"
          class="icon-btn"
          type="button"
          aria-label="Toggle color theme"
          aria-pressed="false"
        >
          <svg class="icon icon--sun" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="4" />
            <path
              d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"
            />
          </svg>
          <svg class="icon icon--moon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
        </button>
      </nav>
    </header>

    <main id="main" class="container">
      <section class="result-panel" aria-labelledby="result-label">
        <h2 id="result-label" class="visually-hidden">Generated username</h2>
        <output
          id="result"
          class="result"
          aria-live="polite"
          aria-atomic="true"
          title="Click to copy"
        >
          loading&hellip;
        </output>
        <div class="actions">
          <button
            id="generate-btn"
            class="btn btn--primary"
            type="button"
            disabled
          >
            Generate
          </button>
          <button
            id="copy-btn"
            class="btn btn--secondary"
            type="button"
            disabled
          >
            Copy
          </button>
        </div>
        <p id="toast" class="toast" role="status" hidden>Copied!</p>
      </section>

      <form id="options" class="options card" aria-labelledby="options-heading">
        <h2 id="options-heading" class="card-title">Options</h2>
        <div class="options-grid">
          <label class="field">
            <span class="field-label">Preset</span>
            <select id="preset" name="preset"></select>
            <span class="field-hint" id="preset-hint"></span>
          </label>

          <label class="field">
            <span class="field-label">Word count</span>
            <input
              id="wordCount"
              name="wordCount"
              type="number"
              min="1"
              max="8"
              value="2"
              inputmode="numeric"
            />
          </label>

          <label class="field">
            <span class="field-label">Separator</span>
            <select id="separator" name="separator">
              <option value="hyphen">- (hyphen)</option>
              <option value="underscore">_ (underscore)</option>
              <option value="dot">. (dot)</option>
              <option value="none">none</option>
            </select>
          </label>

          <label class="field">
            <span class="field-label">Case</span>
            <select id="caseStyle" name="caseStyle">
              <option value="lower">lowercase</option>
              <option value="title">Title Case</option>
              <option value="upper">UPPERCASE</option>
              <option value="camel">camelCase</option>
            </select>
          </label>

          <label class="field">
            <span class="field-label">Trailing digits</span>
            <input
              id="digits"
              name="digits"
              type="number"
              min="0"
              max="6"
              value="0"
              inputmode="numeric"
            />
          </label>

          <label class="field">
            <span class="field-label">Max length (0 = unlimited)</span>
            <input
              id="maxLength"
              name="maxLength"
              type="number"
              min="0"
              max="64"
              value="0"
              inputmode="numeric"
            />
          </label>
        </div>
      </form>
    </main>

  </body>
</html>
